<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>💼 Job Finder</h1>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search jobs">
<button onclick="searchJobs()">Search</button>
</div>

<div class="btn-group">
<button onclick="openModal('jobsModal')">Available Jobs</button>
<button onclick="openModal('savedModal')">Saved Jobs</button>
</div>

</div>

<!-- Available Jobs Modal -->
<div id="jobsModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('jobsModal')">&times;</span>
    <h2>Available Jobs</h2>
    <div id="jobs"></div>
  </div>
</div>

<!-- Saved Jobs Modal -->
<div id="savedModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('savedModal')">&times;</span>
    <h2>Saved Jobs</h2>
    <div id="savedJobs"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
